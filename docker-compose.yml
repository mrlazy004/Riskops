version: "3.9"

services:

  # ── MySQL Database ─────────────────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: riskops-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: risk_management_dev
      MYSQL_USER: riskuser
      MYSQL_PASSWORD: riskpassword
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (for async jobs in production) ──────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: riskops-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ── Flask Backend ─────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: riskops-backend
    restart: unless-stopped
    environment:
      FLASK_ENV: production
      FLASK_APP: run.py
      DATABASE_URL: mysql+pymysql://riskuser:riskpassword@db:3306/risk_management_dev
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production-32-chars-min}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-jwt-change-me-in-production-32-chars}
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: http://localhost,http://localhost:80
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: >
      sh -c "flask db upgrade &&
             python seed.py &&
             gunicorn --bind 0.0.0.0:5000 --workers 4 --timeout 120 run:app"

  # ── Nginx Frontend ─────────────────────────────────────────────────────────
  frontend:
    image: nginx:alpine
    container_name: riskops-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend

volumes:
  mysql_data:
